</filter>
</defs>
<rect x="0.5" y="0.5" width="208.8" height="51.0" rx="4" fill="#0a0a0d"/>
<rect x="12.0" y="12.0" width="185.8" height="28.0" fill="#d97757" filter="url(#glow)" opacity="0.9"/>
<g transform="translate(12.0,12.0)"><title>RED TEAM AUTOMATION</title><g shape-rendering="crispEdges"><rect width="185.75" height="28" fill="#d97757"/></g><g fill="#fff" text-anchor="middle" font-family="Verdana,Geneva,DejaVu Sans,sans-serif" text-rendering="geometricPrecision" font-size="100"><text transform="scale(.1)" x="928.75" y="175" textLength="1617.5" font-weight="bold">RED TEAM AUTOMATION</text></g></g>
<rect x="12.0" y="12.0" width="185.8" height="28.0" fill="none" stroke="#d97757" stroke-width="6.4" filter="url(#halo)" opacity="0.85"/>
<rect x="12.0" y="12.0" width="185.8" height="28.0" fill="none" stroke="#ffffff" stroke-width="1.4" opacity="0.85"/>
