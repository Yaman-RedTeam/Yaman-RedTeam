<svg xmlns="http://www.w3.org/2000/svg" width="209.8" height="52.0" viewBox="0 0 209.8 52.0" role="img" aria-label="Red Team Automation">
<defs>
<filter id="glow" x="-200%" y="-200%" width="500%" height="500%">
<feGaussianBlur stdDeviation="6" result="b"/>
